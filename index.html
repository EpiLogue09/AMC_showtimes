<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showtimes Weekly Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050912;
      --bg-grad-a: #060d19;
      --bg-grad-b: #0b1528;
      --card: rgba(10, 19, 37, 0.82);
      --card-solid: #0c1830;
      --text: #e7f0ff;
      --muted: #8ca3c4;
      --line: #233455;
      --primary: #00c2a8;
      --primary-soft: rgba(0, 194, 168, 0.16);
      --accent: #6eb8ff;
      --accent-soft: rgba(110, 184, 255, 0.18);
      --shadow: 0 22px 48px rgba(2, 8, 20, 0.52);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 500px at -5% -10%, rgba(0, 194, 168, 0.2) 0%, transparent 60%),
        radial-gradient(900px 450px at 120% 10%, rgba(110, 184, 255, 0.14) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-grad-a), var(--bg-grad-b));
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(140, 163, 196, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140, 163, 196, 0.08) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      pointer-events: none;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(61, 88, 138, 0.55);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .header {
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .header h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.6rem, 1.2rem + 1vw, 2.2rem);
      letter-spacing: -0.02em;
    }

    .subline {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status-chip {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(110, 184, 255, 0.35);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .controls {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 0.84rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    select,
    button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      background: var(--card-solid);
      color: var(--text);
    }

    select {
      min-width: min(100%, 360px);
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(110, 184, 255, 0.06);
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), #00a6ff);
      color: #02131f;
      border: 1px solid rgba(131, 235, 255, 0.4);
      box-shadow: 0 8px 22px rgba(0, 168, 201, 0.28);
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:focus-visible,
    select:focus-visible {
      outline: 2px solid rgba(0, 194, 168, 0.8);
      outline-offset: 2px;
    }

    .calendar {
      display: grid;
      gap: 8px;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .calendar-day {
      min-height: 70px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(8, 17, 35, 0.85);
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .calendar-day:hover {
      border-color: #3fbfdf;
      transform: translateY(-1px);
    }

    .calendar-day.is-selected {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: inset 0 0 0 1px rgba(0, 194, 168, 0.32);
    }

    .calendar-day .date-num {
      font-weight: 800;
      font-size: 1rem;
    }

    .calendar-day .week-label {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .metrics {
      padding: 0 18px 18px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .metric {
      background: rgba(8, 17, 35, 0.88);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px;
    }

    .metric .title {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .metric .value {
      margin-top: 6px;
      font-size: 1.2rem;
      font-weight: 800;
    }

    .week-board {
      padding: 18px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(7, minmax(240px, 1fr));
      overflow-x: auto;
    }

    .day-card {
      background: rgba(8, 17, 35, 0.94);
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      padding: 12px;
      min-height: 420px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .day-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
    }

    .day-date {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 3px;
    }

    .movies {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .movie {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px;
      background: rgba(11, 22, 45, 0.9);
    }

    .movie a {
      color: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .movie a:hover {
      text-decoration: underline;
    }

    .movie-meta {
      font-size: 0.79rem;
      color: #9eb3cf;
      line-height: 1.4;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      border: 1px dashed var(--line);
      border-radius: var(--radius-sm);
      padding: 10px;
      background: rgba(10, 18, 34, 0.75);
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .header {
        flex-direction: column;
      }

      .week-board {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel header">
      <div>
        <h1>AMC Weekly Showtimes Planner</h1>
        <div class="subline" id="subtitle">Loading theater data...</div>
      </div>
      <div class="status-chip" id="generated-status">Preparing feed...</div>
    </section>

    <section class="panel controls">
      <div class="control-row">
        <label for="theater-select">Theater</label>
        <select id="theater-select"></select>
        <button id="reload-btn" type="button">Reload Data</button>
      </div>
      <div class="calendar" id="calendar"></div>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="panel week-board" id="week-board"></section>
  </main>

  <script>
    const THEATERS = [
      { name: 'AMC Carolina Pavilion 22', slug: 'amc-carolina-pavilion-22' },
      { name: 'AMC Concord Mills 24', slug: 'amc-concord-mills-24' },
      { name: 'AMC North Lake 14', slug: 'amc-north-lake-14' },
    ];

    const state = {
      theaterData: null,
      selectedSlug: THEATERS[0].slug,
      selectedWeekIndex: 0,
    };

    async function fetchJson(url) {
      const response = await fetch(`${url}?ts=${Date.now()}`);
      if (!response.ok) {
        throw new Error(`Failed to fetch ${url}`);
      }
      return response.json();
    }

    function isoToDate(iso) {
      const [year, month, day] = iso.split('-').map(Number);
      return new Date(year, month - 1, day);
    }

    function formatReadableDate(iso) {
      return isoToDate(iso).toLocaleDateString(undefined, {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
      });
    }

    function totalShowings(movie) {
      return (movie.showing || []).reduce((sum, item) => sum + (item.time || []).length, 0);
    }

    function getWeekDays() {
      if (!state.theaterData) {
        return [];
      }
      const selected = state.theaterData.week_ranges[state.selectedWeekIndex];
      if (!selected) {
        return [];
      }

      const start = selected.start;
      const end = selected.end;
      return state.theaterData.days.filter((day) => day.iso_date >= start && day.iso_date <= end);
    }

    function renderTheaterSelect() {
      const select = document.getElementById('theater-select');
      select.innerHTML = '';

      THEATERS.forEach((theater) => {
        const option = document.createElement('option');
        option.value = theater.slug;
        option.textContent = theater.name;
        if (theater.slug === state.selectedSlug) {
          option.selected = true;
        }
        select.appendChild(option);
      });
    }

    function renderCalendar() {
      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';
      if (!state.theaterData) {
        return;
      }

      const selectedWeek = state.theaterData.week_ranges[state.selectedWeekIndex];
      if (!selectedWeek) {
        calendar.innerHTML = '<div class="empty">No dated showtimes available for this theater.</div>';
        return;
      }
      const info = document.createElement('div');
      info.className = 'subline';
      info.textContent = `Week selected: ${selectedWeek.label}`;
      calendar.appendChild(info);

      const weekdays = document.createElement('div');
      weekdays.className = 'calendar-weekdays';
      ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach((label) => {
        const el = document.createElement('div');
        el.className = 'weekday';
        el.textContent = label;
        weekdays.appendChild(el);
      });
      calendar.appendChild(weekdays);

      const grid = document.createElement('div');
      grid.className = 'calendar-grid';

      state.theaterData.days.forEach((day) => {
        const weekIndex = state.theaterData.week_ranges.findIndex(
          (week) => day.iso_date >= week.start && day.iso_date <= week.end
        );

        const dayCell = document.createElement('button');
        dayCell.type = 'button';
        dayCell.className = `calendar-day ${weekIndex === state.selectedWeekIndex ? 'is-selected' : ''}`;
        dayCell.innerHTML = `
          <span class="date-num">${isoToDate(day.iso_date).getDate()}</span>
          <span class="week-label">W${weekIndex + 1}</span>
        `;

        dayCell.addEventListener('click', () => {
          state.selectedWeekIndex = weekIndex;
          render();
        });

        grid.appendChild(dayCell);
      });

      calendar.appendChild(grid);
    }

    function renderMetrics() {
      const days = getWeekDays();
      const uniqueMovies = new Set();
      let showingsCount = 0;
      const realDaysLoaded = state.theaterData?.real_days_loaded ?? 0;
      days.forEach((day) => {
        (day.movies || []).forEach((movie) => {
          uniqueMovies.add(movie.name);
          showingsCount += totalShowings(movie);
        });
      });

      const metrics = [
        { title: 'Week Days Loaded', value: String(days.length) },
        { title: 'Unique Movies', value: String(uniqueMovies.size) },
        { title: 'Total Showings', value: String(showingsCount) },
        { title: 'Real Data Days (30d)', value: String(realDaysLoaded) },
      ];

      const metricsRoot = document.getElementById('metrics');
      metricsRoot.innerHTML = '';
      metrics.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'metric';
        card.innerHTML = `<div class="title">${item.title}</div><div class="value">${item.value}</div>`;
        metricsRoot.appendChild(card);
      });
    }

    function renderWeekBoard() {
      const board = document.getElementById('week-board');
      board.innerHTML = '';

      const weekDays = getWeekDays();
      if (!weekDays.length) {
        board.innerHTML = '<div class="empty">No week data available.</div>';
        return;
      }

      weekDays.forEach((day) => {
        const card = document.createElement('article');
        card.className = 'day-card';

        const movies = [...(day.movies || [])].sort((a, b) => totalShowings(b) - totalShowings(a));
        const moviesHtml = movies.length
          ? movies
              .map((movie) => {
                const showings = (movie.showing || [])
                  .map((fmt) => {
                    const times = fmt.time || [];
                    const snippet = times.slice(0, 4).join(', ');
                    const suffix = times.length > 4 ? ` +${times.length - 4} more` : '';
                    return `<div class="movie-meta"><strong>${fmt.type}:</strong> ${snippet}${suffix}</div>`;
                  })
                  .join('');

                return `
                  <article class="movie">
                    <a href="${movie.link}" target="_blank" rel="noopener noreferrer">${movie.name}</a>
                    ${showings}
                  </article>
                `;
              })
              .join('')
          : '<div class="empty">No movies listed for this day.</div>';

        card.innerHTML = `
          <div class="day-head">
            <div>
              <h3 class="day-title">${day.weekday}</h3>
              <div class="day-date">${formatReadableDate(day.iso_date)}</div>
            </div>
          </div>
          <div class="movies">${moviesHtml}</div>
        `;

        board.appendChild(card);
      });
    }

    function renderTopMeta() {
      const subtitle = document.getElementById('subtitle');
      const status = document.getElementById('generated-status');

      if (!state.theaterData) {
        subtitle.textContent = 'Loading theater data...';
        status.textContent = 'Preparing feed...';
        return;
      }

      const anchor = formatReadableDate(state.theaterData.anchor_date);
      const horizon = state.theaterData.horizon_days;
      const generatedAt = new Date(state.theaterData.generated_at).toLocaleString();
      const selectedWeek = state.theaterData.week_ranges[state.selectedWeekIndex];
      if (!selectedWeek) {
        subtitle.textContent = `${state.theaterData.theater} • no loaded days in ${horizon}-day horizon from ${anchor}`;
        status.textContent = `Feed generated ${generatedAt}`;
        return;
      }

      subtitle.textContent = `${state.theaterData.theater} • ${selectedWeek.label} • ${horizon}-day horizon from ${anchor}`;
      status.textContent = `Feed generated ${generatedAt}`;
    }

    function render() {
      renderTopMeta();
      renderTheaterSelect();
      renderCalendar();
      renderMetrics();
      renderWeekBoard();
    }

    async function loadTheater(slug) {
      state.selectedSlug = slug;
      state.theaterData = await fetchJson(`data/${slug}.json`);
      state.selectedWeekIndex = 0;
      render();
    }

    async function init() {
      await loadTheater(state.selectedSlug);

      document.getElementById('theater-select').addEventListener('change', async (event) => {
        await loadTheater(event.target.value);
      });

      document.getElementById('reload-btn').addEventListener('click', async () => {
        await loadTheater(state.selectedSlug);
      });
    }

    init().catch((error) => {
      document.getElementById('subtitle').textContent = 'Failed to load data. Run: python AMC_API.py';
      document.getElementById('generated-status').textContent = 'Load error';
      document.getElementById('week-board').innerHTML = `<div class="empty">${error.message}</div>`;
      console.error(error);
    });
  </script>
</body>
</html>
